unbind r
bind r source-file ~/.tmux.conf

# windows
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "basic"
set -g base-index 1
set -g renumber-windows on
set -g escape-time 0


run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

unbind d
bind d kill-window
bind w new-window \; split-window -h \; split-window \; select-pane -L

## panes

bind -n C-M-h resize-pane -L 
bind -n C-M-j resize-pane -D 
bind -n C-M-k resize-pane -U
bind -n C-M-l resize-pane -R

bind '"' split-window -v -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"

# cursor navigation
set -g mouse on
setw -g mode-keys vi
set -g wrap-search off
unbind Space
unbind C-v
bind 		     v copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\S+/)?g?\.?(emacs|view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
